name: PR Multi-Version Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  test:
    name: Py ${{ matrix.python-version }}
    # Routes 3.6 and 3.7 to the older runner; everything else to latest
    runs-on: ${{ (matrix.python-version == '3.6.8' || matrix.python-version == '3.7') && 'ubuntu-20.04' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6.8", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package and Reporting Tools
        run: |
          python -m pip install --upgrade pip
          # Installs the local package + testing tools
          pip install . pytest pytest-html

      - name: Run Tests with HTML Report
        id: run_tests
        run: |
          pytest --html=report-${{ matrix.python-version }}.html --self-contained-html

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: report-${{ matrix.python-version }}.html

      - name: Post Results to PR
        if: always()
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🧪 Test Results: Python ${{ matrix.python-version }}
            - **Status:** ${{ steps.run_tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}
            - **Report:** [Download HTML Evidence](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
