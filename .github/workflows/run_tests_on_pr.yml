name: PR Multi-Version Tests

on:
  pull_request:
    branches: [ main ]

permissions:
  pull-requests: write
  contents: read

jobs:
  test:
    name: Py ${{ matrix.python-version }}
    runs-on: ubuntu-latest  # Everyone uses the fast, modern runner
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.6.8", "3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    
    # This is the "Magic" part:
    container:
      image: python:${{ matrix.python-version }}-slim

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Note: 'setup-python' is NOT needed inside a Python container
      # because Python is already there!

      - name: Install and Test
        id: run_tests
        run: |
          python -m pip install --upgrade pip
          pip install . pytest pytest-html
          pytest --html=report.html --self-contained-html

      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: report.html

      - name: Post Results to PR
        if: always()
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🧪 Test Results: Python ${{ matrix.python-version }}
            - **Status:** ${{ steps.run_tests.outcome == 'success' && '✅ Passed' || '❌ Failed' }}
            - **Logs:** [View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
